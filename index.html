<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Holi - Shivani Karna</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Animated Background -->
        <div class="background-gradient"></div>

        <!-- Main Content -->
        <div class="content">
            <!-- Glowing Name -->
            <h1 class="glowing-name">Shivani Karna</h1>

            <!-- Wishes Message -->
            <p class="wishes-message">Happy Holi to you and your beautiful family</p>

            <!-- Color Burst Button -->
            <button class="color-burst-btn" id="colorBtn">🎨 Celebrate Holi 🎨</button>

            <!-- Confetti Container -->
            <div id="confetti-container"></div>
        </div>
    </div>

    <!-- Background Music (using Web Audio - no external file needed) -->
    <script src="script.js"></script>
</body>
</html>
